docker-compose-yaml: docker-compose.yml

environments:
  main:
    cronjobs:
      - name: Refresh AmazeeAI Models
        schedule: "H H * * *"
        command: "node /lagoon/amazeeai-model-refresher.js --once"
        service: openclaw-gateway
  dev:
    cronjobs:
      - name: Refresh AmazeeAI Models
        schedule: "H H * * *"
        command: "node /lagoon/amazeeai-model-refresher.js --once"
        service: openclaw-gateway
  prod:
    cronjobs:
      - name: Refresh AmazeeAI Models
        schedule: "H H * * *"
        command: "node /lagoon/amazeeai-model-refresher.js --once"
        service: openclaw-gateway
