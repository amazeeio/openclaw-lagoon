# Environment variables are loaded from .env (git-ignored, not in Docker images).
# Copy .env.example to .env and set your values.

services:
  openclaw-gateway:
    platform: linux/amd64
    image: ghcr.io/amazeeio/openclaw-lagoon-base:v2026.3.28_3
    user: "10000"
    env_file:
      - .env
    volumes:
      - ./.local:/home/.openclaw
    ports:
      - "3000:3000"
    labels:
      lagoon.type: node-persistent
      lagoon.persistent: /home/.openclaw