# Environment variables are loaded from .env (git-ignored, not in Docker images).
# Copy .env.example to .env and set your values.

services:
  openclaw-gateway:
    platform: linux/amd64
    image: ghcr.io/amazeeio/openclaw-lagoon-base:v2026.6.10_8
    user: "10000"
    environment:
      - AMAZEEAI_BASE_URL=${AMAZEEAI_BASE_URL:-https://llm.us103.amazee.ai}
      - AMAZEEAI_API_KEY=${AMAZEEAI_API_KEY}
      - AMAZEEAI_DEFAULT_MODEL=${AMAZEEAI_DEFAULT_MODEL:-chat}
    volumes:
      - ./.local:/home/.openclaw
    ports:
      - "3001:3000"
    labels:
      lagoon.type: node-persistent
      lagoon.persistent: /home/.openclaw
